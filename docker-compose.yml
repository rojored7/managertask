version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: managertask-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: managertask
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5437:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - managertask-network

  redis:
    image: redis:7-alpine
    container_name: managertask-redis
    restart: unless-stopped
    ports:
      - "6384:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes
    networks:
      - managertask-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: managertask-backend
    restart: unless-stopped
    ports:
      - "4004:4004"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/managertask?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your-super-secret-refresh-jwt-key}
      CORS_ORIGIN: http://localhost:3004
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - managertask-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: managertask-frontend
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      VITE_API_URL: http://localhost:4004/api
      VITE_APP_NAME: managertask
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - managertask-network

  nginx:
    image: nginx:alpine
    container_name: managertask-nginx
    restart: unless-stopped
    ports:
      - "8082:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - managertask-network

networks:
  managertask-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data: